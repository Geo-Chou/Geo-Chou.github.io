  # milestones:
  #   - type: abstract
  #     date: "2026-05-08T20:00:00-07:00"
  #   - type: submission
  #     date: "2026-05-15T20:00:00-07:00"
  #   - type: rebuttal
  #     date: "2026-08-01T20:00:00-07:00"
  #   - type: decision
  #     date: "2026-09-15T20:00:00-07:00"
  #   - type: conference
  #     date: "2026-12-01T09:00:00-08:00"
